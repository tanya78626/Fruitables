{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f2f2f2;
        }

        .container{
            width:350px;
            margin:120px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Enter Email" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

    </form>
</div>

</body>
</html>
